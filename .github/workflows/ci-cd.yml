name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and push backend image
      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Step 4: Build and push frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # Step 5: Start containers using docker-compose
      - name: Start containers
        run: |
          docker-compose up -d

      # Step 6: Vérifications automatiques
      - name: Vérifications des conteneurs
        run: |
          echo "Vérification: tous les conteneurs sont en running..."
          docker ps  # Affiche tous les conteneurs actifs

          echo "Vérification: Frontend communique avec Backend..."
          # Attendre un peu pour que les services démarrent
          sleep 10

          # Tester le frontend (ex: port 80)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Erreur: le frontend ne répond pas correctement !"
            exit 1
          else
            echo "Frontend OK, communication avec Backend OK "
          fi
