name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and push backend image
      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          dockerfile: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Step 4: Build and push frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          dockerfile: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # Step 5: Start containers using modern docker compose
      - name: Start containers
        run: |
          docker compose up -d

      # Step 6: Vérifications automatiques avec retry

      - name: Vérifications des conteneurs et frontend
        run: |
          echo "Vérification: tous les conteneurs sont en running..."
          docker ps

          echo "Vérification: Frontend communique avec Backend..."
          MAX_RETRIES=12
          RETRY_COUNT=0
          RESPONSE="000"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ]
          do
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4200 || echo "000")
              
              if [ "$RESPONSE" = "200" ]; then
                  echo "Frontend OK, communication avec Backend OK 👍"
                  break
              fi
              
              echo "Attente du frontend... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 5
          done

          # Final check after loop
          if [ "$RESPONSE" != "200" ]; then
              echo "Erreur: le frontend ne répond pas après 60 secondes !"
              docker logs deploy-app-spring-angular-angular-app-1 || true
              exit 1
          fi
